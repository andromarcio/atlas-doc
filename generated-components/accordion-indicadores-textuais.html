<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores Textuais</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    max-width: 680px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
  }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #1a1a1a;
    cursor: pointer;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: #555;
    border-radius: 20px;
    transition: background 0.2s;
  }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: right 0.2s;
  }

  .toggle input:checked ~ .toggle-track { background: #2563eb; }
  .toggle input:checked ~ .toggle-track .toggle-thumb { right: auto; left: 3px; }

  .section {
    background: #f5f7fa;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 13px;
    color: #555;
    text-align: center;
    margin-bottom: 12px;
  }

  .accordion-item {
    background: #fff;
    border-radius: 6px;
    margin-bottom: 4px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
  }

  .accordion-item:last-child { margin-bottom: 0; }

  .accordion-trigger {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    text-align: left;
  }

  .accordion-trigger:hover { background: #f9fafb; }

  .accordion-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #2563eb;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }

  .accordion-indicator svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .accordion-indicator.icon-only span { display: none; }

  .accordion-content {
    display: none;
    padding: 0 16px 14px;
    font-size: 14px;
    color: #444;
  }

  .accordion-item.is-open .accordion-content { display: block; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="card-title">Indicadores textuais</span>
    <label class="toggle-label">
      Exibir código
      <div class="toggle">
        <input type="checkbox">
        <div class="toggle-track">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </label>
  </div>

  <div class="section">
    <div class="section-label">Indicadores "Expandir" e "Recolher" aparentes</div>

    <div class="accordion-item">
      <button class="accordion-trigger" onclick="toggle(this)">
        Title
        <div class="accordion-indicator">
          <span>Expandir</span>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </div>
      </button>
      <div class="accordion-content">Conteúdo do componente.</div>
    </div>

    <div class="accordion-item is-open" data-open="true">
      <button class="accordion-trigger" onclick="toggle(this)">
        Title
        <div class="accordion-indicator">
          <span>Recolher</span>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 10l4-4 4 4"/>
          </svg>
        </div>
      </button>
      <div class="accordion-content">Conteúdo do componente.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Indicadores "Expandir" e "Recolher" ocultos</div>

    <div class="accordion-item">
      <button class="accordion-trigger" onclick="toggle(this)">
        Title
        <div class="accordion-indicator icon-only">
          <span>Expandir</span>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </div>
      </button>
      <div class="accordion-content">Conteúdo do componente.</div>
    </div>

    <div class="accordion-item is-open">
      <button class="accordion-trigger" onclick="toggle(this)">
        Title
        <div class="accordion-indicator icon-only">
          <span>Recolher</span>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 10l4-4 4 4"/>
          </svg>
        </div>
      </button>
      <div class="accordion-content">Conteúdo do componente.</div>
    </div>
  </div>
</div>

<script>
  function toggle(btn) {
    const item = btn.closest('.accordion-item');
    const isOpen = item.classList.toggle('is-open');
    const indicator = btn.querySelector('.accordion-indicator');
    const span = indicator.querySelector('span');
    const path = indicator.querySelector('path');

    if (isOpen) {
      if (span) span.textContent = 'Recolher';
      path.setAttribute('d', 'M4 10l4-4 4 4');
    } else {
      if (span) span.textContent = 'Expandir';
      path.setAttribute('d', 'M4 6l4 4 4-4');
    }
  }
</script>

</body>
</html>
