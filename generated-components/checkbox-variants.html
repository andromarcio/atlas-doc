<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkbox – Variants</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    padding: 48px;
    display: flex;
    gap: 48px;
    align-items: flex-start;
  }

  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .variant-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a1a;
    padding-bottom: 6px;
    border-bottom: 2px solid #ddd;
    width: 100%;
    text-align: center;
  }

  /* Checkbox wrapper */
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .checkbox-label input { display: none; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    border: 2px solid #aaa;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .checkmark {
    display: none;
    width: 11px;
    height: 8px;
    border-left: 2.5px solid #fff;
    border-bottom: 2.5px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }

  /* Checked state */
  input:checked ~ .checkbox .checkmark { display: block; }

  /* Neutral – unchecked */
  .neutral .checkbox { border-color: #aaa; background: #fff; }
  .neutral input:checked ~ .checkbox { background: #aaa; border-color: #aaa; }

  /* Highlight – blue */
  .highlight .checkbox { border-color: #1a4fa0; background: #1a4fa0; }
  .highlight .checkmark { display: block; }

  /* Accent – amber */
  .accent .checkbox { border-color: #c87c00; background: #c87c00; }
  .accent .checkmark { display: block; }

  /* Danger – red */
  .danger .checkbox { border-color: #c0392b; background: #c0392b; }
  .danger .checkmark { display: block; }
  .danger .label-text { color: #c0392b; font-weight: 700; }

  .label-text {
    font-size: 15px;
    color: #1a1a1a;
  }
</style>
</head>
<body>

  <!-- Neutral -->
  <div class="variant">
    <div class="variant-title">Neutral</div>
    <label class="checkbox-label neutral">
      <input type="checkbox">
      <div class="checkbox"><span class="checkmark"></span></div>
      <span class="label-text">Label</span>
    </label>
  </div>

  <!-- Highlight -->
  <div class="variant">
    <div class="variant-title">Highlight</div>
    <label class="checkbox-label highlight">
      <input type="checkbox" checked>
      <div class="checkbox"><span class="checkmark"></span></div>
      <span class="label-text">Label</span>
    </label>
  </div>

  <!-- Accent -->
  <div class="variant">
    <div class="variant-title">Accent</div>
    <label class="checkbox-label accent">
      <input type="checkbox" checked>
      <div class="checkbox"><span class="checkmark"></span></div>
      <span class="label-text">Label</span>
    </label>
  </div>

  <!-- Danger -->
  <div class="variant">
    <div class="variant-title">Danger</div>
    <label class="checkbox-label danger">
      <input type="checkbox" checked>
      <div class="checkbox"><span class="checkmark"></span></div>
      <span class="label-text">Label</span>
    </label>
  </div>

</body>
</html>
