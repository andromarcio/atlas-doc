<!DOCTYPE html>
<html lang="pt-BR" class="app-light">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs</title>
  <!-- Sakai.css — design system baseado em sakai-ng (PrimeNG) -->
  <link rel="stylesheet" href="prototypes/_biblioteca/sakai.css">
  <!-- Docs-specific overrides -->
  <link rel="stylesheet" href="overrides.css">
  <!-- Marked.js para renderização de Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <!-- Highlight.js para syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css"
    id="hljs-theme-light">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css"
    id="hljs-theme-dark" disabled>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
</head>

<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════════════ -->
  <header class="layout-topbar" id="app-header" data-theme="gradient">
    <div class="layout-topbar-logo-container">
      <button class="layout-topbar-action" id="sidebar-toggle" title="Alternar menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <a class="layout-topbar-logo" href="#">
        <span class="logo-mark">📋</span>
        <span id="system-name">Carregando…</span>
      </a>
    </div>
    <div class="layout-topbar-actions">
      <div class="docs-search-wrap">
        <input type="text" id="search-input" class="docs-search-input" placeholder="Buscar arquivo…" autocomplete="off">
        <span class="docs-search-icon">🔍</span>
        <div class="docs-search-results" id="search-results"></div>
      </div>
      <a class="layout-topbar-action" id="github-link" href="#" target="_blank" title="Abrir no GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.49.5.09.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.603-3.369-1.343-3.369-1.343-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.547 2.914 1.186.09-.924.35-1.547.636-1.903-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z">
          </path>
        </svg>
      </a>
      <button class="layout-topbar-action" id="dev-toggle-btn" title="Alternar seção técnica">💻</button>
      <button class="layout-topbar-action" id="theme-btn" title="Alternar tema">🌙</button>
    </div>
  </header>

  <!-- ═══ LAYOUT ════════════════════════════════════════════════════ -->
  <div class="layout-wrapper">

    <!-- ─── SIDEBAR ──────────────────────────────────────────────── -->
    <aside class="layout-sidebar" id="sidebar">
      <div class="layout-menu-section-title">ESTRUTURA</div>
      <nav class="layout-menu" id="file-tree">
        <div class="layout-menu-loading">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-line"></div>
        </div>
      </nav>
    </aside>

    <!-- ─── SIDEBAR OVERLAY (mobile) ─────────────────────────────── -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ─── CONTENT ──────────────────────────────────────────────── -->
    <div class="layout-main-container">
      <main class="layout-main" id="content-area">
          <div id="content-inner" class="content-card">
          <!-- Welcome screen -->
          <div class="welcome" id="welcome-screen">
            <div class="welcome-icon">📚</div>
            <h1 class="welcome-title" id="welcome-title">Carregando…</h1>
            <p class="welcome-subtitle">Selecione um arquivo no menu lateral para visualizar seu conteúdo.</p>
            <div class="welcome-stats" id="welcome-stats"></div>
          </div>
        </div>
      </main>
    </div>

  </div>

  <!-- ═══ PROTOTYPE MODAL ══════════════════════════════════════════ -->
  <div class="docs-proto-modal" id="proto-modal">
    <div class="docs-proto-modal-header">
      <span id="proto-modal-title">Protótipo</span>
      <div style="display:flex;gap:8px;align-items:center">
        <a id="proto-open-link" href="#" target="_blank" class="p-button p-button-sm p-button-text">↗ Abrir</a>
        <button class="docs-proto-close-btn" onclick="closeProto()">✕</button>
      </div>
    </div>
    <iframe id="proto-frame" src="about:blank" frameborder="0"></iframe>
  </div>
  <div class="docs-proto-backdrop" id="proto-backdrop" onclick="closeProto()"></div>

  <script src="repo.config.js"></script>
  <script src="script.js"></script>
</body>

</html>
