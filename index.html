<!DOCTYPE html>
<html lang="pt-BR" class="app-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doc Template — Documentação, Design System e Prompts</title>
  <meta name="description" content="Template de documentação de software (FDD) com design system sakai-ng, biblioteca de componentes e prompts orquestrados para especificação.">
  <!-- Design system (sakai-ng / PrimeNG · tema Aura · blue + slate) -->
  <link rel="stylesheet" href="prototypes/_biblioteca/sakai.css">
  <!-- Configuração do repositório (deve ser carregado antes do script inline) -->
  <script src="repo.config.js"></script>
  <style>
    /* ── Estilos exclusivos da landing (não fazem parte da biblioteca) ── */
    .lp-main { max-width: 1080px; margin: 0 auto; padding: 5.5rem 1.5rem 3rem; }

    /* Hero */
    .lp-hero { text-align: center; padding: 2.5rem 0 3rem; }
    .lp-hero .p-tag { margin-bottom: 1.25rem; }
    .lp-hero h1 {
      font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1; margin: 0 0 1rem;
      letter-spacing: -0.02em;
    }
    .lp-hero h1 mark { background: none; color: var(--primary-color); }
    .lp-hero p.lp-lead {
      font-size: 1.125rem; color: var(--text-color-secondary);
      max-width: 42rem; margin: 0 auto 2rem;
    }
    .lp-cta { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    /* Grid de cards */
    .lp-section-title {
      font-size: .8125rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted-color);
      margin: 3rem 0 1rem;
    }
    .lp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    @media (max-width: 820px) { .lp-grid { grid-template-columns: 1fr; } }

    .lp-card {
      display: flex; flex-direction: column; gap: .5rem;
      background: var(--surface-card); border: 1px solid var(--surface-border);
      border-radius: var(--border-radius-lg); padding: 1.5rem;
      box-shadow: var(--shadow-card); text-decoration: none; color: inherit;
      transition: transform var(--transition-duration), box-shadow var(--transition-duration), border-color var(--transition-duration);
    }
    .lp-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-overlay); border-color: var(--p-primary-300); }
    .lp-card-icon {
      width: 2.75rem; height: 2.75rem; border-radius: var(--border-radius);
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--highlight-bg); color: var(--highlight-color); margin-bottom: .25rem;
    }
    .lp-card-icon svg { width: 1.5rem; height: 1.5rem; }
    .lp-card h3 { margin: 0; font-size: 1.05rem; }
    .lp-card p { margin: 0; font-size: .9rem; color: var(--text-color-secondary); }
    .lp-card .lp-card-link {
      margin-top: auto; padding-top: .75rem; font-size: .85rem; font-weight: 600;
      color: var(--primary-color); display: inline-flex; align-items: center; gap: .25rem;
    }

    /* Pipeline / passos */
    .lp-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 820px) { .lp-steps { grid-template-columns: 1fr 1fr; } }
    .lp-step { padding: 1.25rem; }
    .lp-step .lp-step-num {
      width: 2rem; height: 2rem; border-radius: 50%; background: var(--primary-color);
      color: var(--primary-contrast-color); font-weight: 700; font-size: .9rem;
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: .6rem;
    }
    .lp-step h4 { margin: 0 0 .25rem; font-size: .95rem; }
    .lp-step p { margin: 0; font-size: .82rem; color: var(--text-color-secondary); }

    /* Footer */
    .lp-footer {
      text-align: center; margin-top: 4rem; padding-top: 2rem;
      border-top: 1px solid var(--surface-border);
      color: var(--text-muted-color); font-size: .85rem;
    }
    .lp-footer a { color: var(--primary-color); text-decoration: none; }
  </style>
</head>
<body>

  <!-- ═══ TOPBAR ═══════════════════════════════════════════════════ -->
  <header class="layout-topbar">
    <div class="layout-topbar-logo-container">
      <a class="layout-topbar-logo" href="#" id="lp-logo">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.5"/><path d="M7 12h10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </span>
        <span id="lp-logo-text">Doc Template</span>
      </a>
    </div>
    <div class="layout-topbar-actions">
      <a class="layout-topbar-action" id="lp-github-link" href="#" target="_blank" rel="noopener" title="Abrir no GitHub" aria-label="Abrir no GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.49.5.09.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.603-3.369-1.343-3.369-1.343-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.547 2.914 1.186.09-.924.35-1.547.636-1.903-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      </a>
      <button class="layout-topbar-action" id="darkToggle" title="Alternar tema" aria-label="Alternar tema">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <main class="lp-main">

    <!-- ═══ HERO ═══════════════════════════════════════════════════ -->
    <section class="lp-hero" id="lp-hero">
      <span class="p-tag p-tag-success" id="lp-badge">Feature-Driven Documentation</span>
      <h1 id="lp-title">Carregando…</h1>
      <p class="lp-lead" id="lp-lead"></p>
      <div class="lp-cta">
        <a class="p-button p-button-lg" href="viewer.html">
          <svg class="p-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Abrir documentação
        </a>
        <a class="p-button p-button-lg p-button-outlined" href="prototypes/_biblioteca/index.html">
          Ver componentes
        </a>
      </div>
    </section>

    <!-- ═══ EXPLORAR ═══════════════════════════════════════════════ -->
    <div class="lp-section-title">Explorar</div>
    <section class="lp-grid" id="lp-cards"></section>

    <!-- ═══ COMO FUNCIONA ══════════════════════════════════════════ -->
    <div class="lp-section-title">Como funciona</div>
    <section class="lp-steps" id="lp-steps"></section>

    <!-- ═══ FOOTER ═════════════════════════════════════════════════ -->
    <footer class="lp-footer" id="lp-footer"></footer>

  </main>

  <script>
    /* ── Lê configuração ── */
    var cfg    = (window.REPO_CONFIG || {});
    var lp     = cfg.landing || {};
    var owner  = cfg.owner  || 'andromarcio';
    var repo   = cfg.name   || 'atlas-doc';
    var branch = cfg.branch || 'main';
    var github = 'https://github.com/' + owner + '/' + repo;

    /* ── Helpers ── */
    function resolveHref(href) {
      if (!href) return '#';
      return href
        .replace(/\{github\}/g, github)
        .replace(/\{branch\}/g, branch)
        .replace(/\{owner\}/g,  owner)
        .replace(/\{repo\}/g,   repo);
    }

    /* ── Popula topbar ── */
    document.getElementById('lp-github-link').href = github;
    document.getElementById('lp-logo-text').textContent = repo;

    /* ── Popula hero ── */
    if (lp.badge) document.getElementById('lp-badge').textContent = lp.badge;
    if (lp.title) document.getElementById('lp-title').innerHTML   = lp.title;
    if (lp.lead)  document.getElementById('lp-lead').textContent  = lp.lead;

    /* Tenta carregar nome do sistema a partir do MASTER.md */
    var masterUrl = 'https://raw.githubusercontent.com/' + owner + '/' + repo + '/' + branch + '/global/MASTER.md';
    fetch(masterUrl).then(function(r){ return r.ok ? r.text() : null; }).then(function(text){
      if (!text) return;
      var m = text.match(/\*\*Sigla\*\*:\s*(.+)/);
      if (m && m[1].trim() && m[1].trim() !== '[Nome do sistema]') {
        var name = m[1].trim();
        document.getElementById('lp-logo-text').textContent = name;
        document.title = name + ' — Docs';
        if (!lp.badge) document.getElementById('lp-badge').textContent = name;
      }
    }).catch(function(){});

    /* ── Popula cards ── */
    var cards = lp.cards || [];
    var cardsEl = document.getElementById('lp-cards');
    cardsEl.innerHTML = cards.map(function(c) {
      var href = resolveHref(c.href);
      var extra = c.external ? ' target="_blank" rel="noopener"' : '';
      return '<a class="lp-card" href="' + href + '"' + extra + '>'
        + '<span class="lp-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + c.icon + '</svg></span>'
        + '<h3>' + c.title + '</h3>'
        + '<p>' + c.desc + '</p>'
        + '<span class="lp-card-link">' + c.label + '</span>'
        + '</a>';
    }).join('');

    /* ── Popula steps ── */
    var steps = lp.steps || [];
    var stepsEl = document.getElementById('lp-steps');
    stepsEl.innerHTML = steps.map(function(s) {
      return '<div class="card lp-step">'
        + '<span class="lp-step-num">' + s.num + '</span>'
        + '<h4>' + s.title + '</h4>'
        + '<p>' + s.desc + '</p>'
        + '</div>';
    }).join('');

    /* ── Popula footer ── */
    var footerEl = document.getElementById('lp-footer');
    var footerText = lp.footer || 'Construído com o design system <strong>sakai-ng</strong> (PrimeNG · tema Aura).';
    footerEl.innerHTML = '<p>' + footerText
      + '&nbsp;·&nbsp;<a href="' + github + '">' + owner + '/' + repo + '</a></p>';

    /* ── Alternância de tema claro/escuro ── */
    (function () {
      var root = document.documentElement;
      var btn = document.getElementById('darkToggle');
      if (localStorage.getItem('lp-theme') === 'dark') {
        root.classList.add('app-dark'); root.classList.remove('app-light');
      }
      btn.addEventListener('click', function () {
        var dark = root.classList.toggle('app-dark');
        root.classList.toggle('app-light', !dark);
        localStorage.setItem('lp-theme', dark ? 'dark' : 'light');
      });
    })();
  </script>
</body>
</html>
